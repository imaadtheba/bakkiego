<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#F5F0E8">
  <title>BakkieGo — Earnings</title>
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #F5F0E8;
      color: #1A1A2E;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100dvh;
      padding: 20px;
    }

    .page {
      max-width: 480px;
      margin: 0 auto;
    }

    .back-link {
      color: #6B7280;
      text-decoration: none;
      font-size: 15px;
      display: inline-block;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 20px;
    }

    /* ── Summary stats ── */
    .stats-row {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
    }

    .stat-card {
      flex: 1;
      background: #FFFFFF;
      border: 1.5px solid #E8EDF2;
      border-radius: 16px;
      padding: 16px;
    }

    .stat-label {
      font-size: 11px;
      font-weight: 700;
      color: #6B7280;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 26px;
      font-weight: 800;
    }

    .stat-value.green { color: #00C853; }

    /* ── Section label ── */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: #6B7280;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 12px;
    }

    /* ── Trip cards ── */
    .trip-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .trip-card {
      background: #FFFFFF;
      border: 1.5px solid #E8EDF2;
      border-radius: 16px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .trip-icon {
      font-size: 26px;
      flex-shrink: 0;
      line-height: 1;
    }

    .trip-meta {
      flex: 1;
      min-width: 0;
    }

    .trip-area {
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .trip-detail {
      font-size: 13px;
      color: #6B7280;
      font-weight: 500;
      margin-top: 3px;
    }

    .trip-price {
      font-size: 15px;
      font-weight: 700;
      color: #00C853;
      flex-shrink: 0;
    }

    .empty-state {
      color: #6B7280;
      font-size: 15px;
      padding: 48px 0;
      text-align: center;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    window.supabase = window.supabase.createClient(
      'https://jtemxqxzgdboxknpfesb.supabase.co',
      'sb_publishable_Da9LJuPKvJoqv_yojX5OSA_oQie51hs'
    );
  </script>
</head>
<body>
<div class="page">
  <a href="driver-home.html" class="back-link">← Home</a>
  <h1>Earnings</h1>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Total Earned</div>
      <div class="stat-value green" id="stat-total">R0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Trips</div>
      <div class="stat-value" id="stat-count">0</div>
    </div>
  </div>

  <div class="section-label">Trip History</div>
  <div class="trip-list" id="trip-list"></div>
</div>
<script>
const user = JSON.parse(localStorage.getItem('user') || 'null');
if (!user) { window.location.replace('login.html'); }

async function loadHistory() {
  const { data: trips } = await supabase
    .from('jobs')
    .select('area, offer_price, counter_price, completed_at')
    .eq('driver_id', user.id).eq('status', 'completed')
    .order('completed_at', { ascending: false });

  const total = (trips || []).reduce((sum, j) => sum + (j.counter_price || j.offer_price || 0), 0);
  document.getElementById('stat-total').textContent = `R${total}`;
  document.getElementById('stat-count').textContent = (trips || []).length;

  const listEl = document.getElementById('trip-list');
  if (!trips || trips.length === 0) {
    listEl.innerHTML = '<div class="empty-state">No completed trips yet</div>'; return;
  }

  listEl.innerHTML = '';
  trips.forEach(t => {
    const price = t.counter_price || t.offer_price;
    const date  = new Date(t.completed_at).toLocaleDateString('en-ZA', { day: 'numeric', month: 'short', year: 'numeric' });
    const card  = document.createElement('div');
    card.className = 'trip-card';
    card.innerHTML = `
      <span class="trip-icon">🚛</span>
      <div class="trip-meta">
        <div class="trip-area">${t.area}</div>
        <div class="trip-detail">${date}</div>
      </div>
      <div class="trip-price">R${price}</div>
    `;
    listEl.appendChild(card);
  });
}

loadHistory();
</script>
</body>
</html>
