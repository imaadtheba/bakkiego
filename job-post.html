<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FFFFFF">
  <title>BakkieGo — Post a Job</title>
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #FFFFFF;
      color: #1A1A2E;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100dvh;
      padding: 20px;
    }

    .page {
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 0;
      padding-bottom: 32px;
    }

    .back-btn {
      background: none;
      border: none;
      color: #556070;
      font-size: 15px;
      font-family: inherit;
      cursor: pointer;
      padding: 0;
      margin-bottom: 20px;
      text-align: left;
    }

    .back-btn:active { opacity: 0.6; }

    .page-title {
      font-size: 26px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 24px;
    }

    /* ── Field labels ── */
    .field-label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #3D4D5C;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
      margin-top: 20px;
    }

    /* ── Address container ── */
    #address-container {
      width: 100%;
    }

    #address-container gmp-place-autocomplete {
      width: 100%;
      display: block;
    }

    #address-container.error {
      outline: 2px solid #FF6D00;
      border-radius: 16px;
    }

    /* ── Price suggestion banner ── */
    .price-suggestion-banner {
      background: #F0FFF4;
      border: 1px solid #00C853;
      border-radius: 12px;
      padding: 14px 16px;
      margin-top: 12px;
      text-align: center;
    }

    .suggestion-label {
      font-size: 12px;
      color: #556070;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .suggestion-price {
      font-size: 28px;
      font-weight: 700;
      color: #00C853;
      margin-bottom: 2px;
    }

    .suggestion-note {
      font-size: 11px;
      color: #8896A5;
    }

    /* ── Load size ── */
    .load-size-options {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .load-option {
      background: #F7F9FC;
      border: 2px solid #E8EDF2;
      border-radius: 16px;
      padding: 14px 8px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: border-color 0.2s, background 0.2s;
      font-family: inherit;
    }

    .load-option:active { opacity: 0.7; }

    .load-option.selected {
      border-color: #00C853;
      background: rgba(0, 200, 83, 0.08);
    }

    .load-icon  { font-size: 26px; line-height: 1; }
    .load-label { color: #1A1A2E; font-weight: 700; font-size: 14px; }
    .load-desc  { color: #556070; font-size: 11px; }

    /* ── Price input ── */
    .price-wrapper {
      display: flex;
      align-items: center;
      background: #F7F9FC;
      border: 2px solid #E8EDF2;
      border-radius: 16px;
      transition: border-color 0.2s;
    }

    .price-wrapper:focus-within { border-color: #00C853; }
    .price-wrapper.error         { border-color: #FF6D00; }

    .price-prefix {
      padding: 18px 4px 18px 18px;
      font-size: 28px;
      font-weight: 700;
      color: #8896A5;
      flex-shrink: 0;
      line-height: 1;
    }

    .price-input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 18px 18px 18px 6px;
      color: #1A1A2E;
      font-size: 28px;
      font-weight: 700;
      font-family: inherit;
      outline: none;
      min-width: 0;
    }

    .price-input::placeholder {
      color: #E8EDF2;
      font-weight: 400;
      font-size: 18px;
    }

    .price-input::-webkit-inner-spin-button,
    .price-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    .price-input { -moz-appearance: textfield; }

    .price-note {
      font-size: 13px;
      color: #556070;
      margin-top: 8px;
    }

    /* ── Post button ── */
    .btn-post {
      display: block;
      width: 100%;
      background: #00C853;
      color: #FFFFFF;
      border: none;
      border-radius: 18px;
      padding: 22px;
      font-size: 18px;
      font-weight: 800;
      font-family: inherit;
      letter-spacing: 0.3px;
      cursor: pointer;
      margin-top: 28px;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-post:active { opacity: 0.84; transform: scale(0.98); }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    window.supabase = window.supabase.createClient(
      'https://jtemxqxzgdboxknpfesb.supabase.co',
      'sb_publishable_Da9LJuPKvJoqv_yojX5OSA_oQie51hs'
    );
  </script>
  <script>
    (g=>{var h,a,k,p="The Google Maps JavaScript API",c="google",l="importLibrary",q="__ib__",m=document,b=window;b=b[c]||(b[c]={});var d=b.maps||(b.maps={}),r=new Set,e=new URLSearchParams,u=()=>h||(h=new Promise(async(f,n)=>{await (a=m.createElement("script"));e.set("libraries",[...r]+"");for(k in g)e.set(k.replace(/[A-Z]/g,t=>"_"+t[0].toLowerCase()),g[k]);e.set("callback",c+".maps."+q);a.src=`https://maps.${c}apis.com/maps/api/js?`+e;d[q]=f;a.onerror=()=>h=n(Error(p+" could not load."));a.nonce=m.querySelector("script[nonce]")?.nonce||"";m.head.append(a)}));d[l]?console.warn(p+" only loads once. Ignoring:",g):d[l]=(f,...n)=>r.add(f)&&u().then(()=>d[l](f,...n))})
    ({key: "AIzaSyBpqNNt-ILFT4vGfTNsBGbe9solN5a1Kkk", v: "weekly"});
  </script>
</head>
<body>
<div class="page">

  <button class="back-btn" onclick="history.back()">← Back</button>
  <div class="page-title">Post a job</div>

  <!-- Address -->
  <label class="field-label" style="margin-top:0">Delivery Address</label>
  <div id="address-container"></div>
  <input type="hidden" id="address-input">
  <input type="hidden" id="area-input">

  <!-- Price suggestion (shown after address selected) -->
  <div id="price-suggestion" style="display:none" class="price-suggestion-banner">
    <p class="suggestion-label">Suggested price for this area</p>
    <p class="suggestion-price" id="suggestion-amount">R0</p>
    <p class="suggestion-note">You can edit this below</p>
  </div>

  <!-- Load size -->
  <label class="field-label">Load Size</label>
  <div class="load-size-options">
    <button type="button" class="load-option" data-size="small" onclick="selectLoadSize('small')">
      <span class="load-icon">📦</span>
      <span class="load-label">Small</span>
      <span class="load-desc">Bags & boxes</span>
    </button>
    <button type="button" class="load-option" data-size="medium" onclick="selectLoadSize('medium')">
      <span class="load-icon">🛒</span>
      <span class="load-label">Medium</span>
      <span class="load-desc">Half bakkie</span>
    </button>
    <button type="button" class="load-option" data-size="large" onclick="selectLoadSize('large')">
      <span class="load-icon">🚛</span>
      <span class="load-label">Large</span>
      <span class="load-desc">Full bakkie</span>
    </button>
  </div>

  <!-- Price -->
  <label class="field-label">Your Offer</label>
  <div class="price-wrapper" id="price-wrapper">
    <span class="price-prefix">R</span>
    <input
      type="number"
      class="price-input"
      id="price-input"
      inputmode="numeric"
      min="1"
      placeholder="0"
    >
  </div>
  <p class="price-note">Drivers can accept or counter your offer</p>

  <button class="btn-post" id="btn-post" onclick="postJob()">POST MY JOB</button>

</div>
<script>
// Auth guard
const _u = JSON.parse(localStorage.getItem('user') || 'null');
if (!_u) { window.location.replace('index.html'); }

/* ── Area price lookup ── */
const AREA_PRICES = [
  { keywords: ['marabastad', 'belle ombre'],                              area: 'Marabastad / Belle Ombre',        price: 150  },
  { keywords: ['bloed', 'pretoria bloed'],                                area: 'Pretoria Bloed',                  price: 150  },
  { keywords: ['arcadia', 'sunnyside'],                                   area: 'Arcadia / Sunnyside',             price: 200  },
  { keywords: ['bosman'],                                                  area: 'Bosman',                          price: 150  },
  { keywords: ['pretoria west'],                                           area: 'Pretoria West',                   price: 100  },
  { keywords: ['centurion', 'lyttelton', 'irene', 'hennopspark'],         area: 'Centurion',                       price: 500  },
  { keywords: ['sangiro'],                                                 area: 'Sangiro',                         price: 700  },
  { keywords: ['gomora', 'hercules', 'danville'],                         area: 'Gomora / Hercules / Danville',    price: 300  },
  { keywords: ['atteridgeville', 'mshongoville', 'laudium', 'sutherland'],area: 'Atteridgeville / Laudium',        price: 400  },
  { keywords: ['mamelodi', 'nellmapius', 'pretoria east', 'silverton'],   area: 'Mamelodi / Pretoria East',        price: 600  },
  { keywords: ['garankuwa', 'ga-rankuwa', 'kgabalatsane', 'hebron', 'erasmus'], area: 'Garankuwa / Kgabalatsane', price: 600  },
  { keywords: ['winterveld', 'mabopane'],                                 area: 'Winterveld / Mabopane',           price: 650  },
  { keywords: ['soshanguve'],                                              area: 'Soshanguve',                      price: 600  },
  { keywords: ['pretoria north', 'roslyn', 'wonderpark'],                 area: 'Pretoria North / Roslyn',         price: 400  },
  { keywords: ['olievenhoutbosch'],                                        area: 'Olievenhoutbosch',                price: 600  },
  { keywords: ['moatla'],                                                  area: 'Moatla',                          price: 800  },
  { keywords: ['mogogela', 'stink water', 'stinkwater'],                  area: 'Mogogela / Stinkwater',           price: 700  },
  { keywords: ['cullinan'],                                                area: 'Cullinan',                        price: 750  },
  { keywords: ['rosslyn'],                                                 area: 'Rosslyn',                         price: 400  },
  { keywords: ['thembisa', 'swazini', 'kaalfontein'],                     area: 'Thembisa / Kaalfontein',          price: 700  },
  { keywords: ['diepsloot'],                                               area: 'Diepsloot',                       price: 700  },
  { keywords: ['hammanskraal'],                                            area: 'Hammanskraal',                    price: 650  },
  { keywords: ['dan house'],                                               area: 'Dan House',                       price: 700  },
  { keywords: ['letlhabile'],                                              area: 'Letlhabile',                      price: 800  },
  { keywords: ['brits'],                                                   area: 'Brits',                           price: 700  },
  { keywords: ['maboloka'],                                                area: 'Maboloka',                        price: 900  },
  { keywords: ['klipgat'],                                                 area: 'Klipgat',                         price: 700  },
  { keywords: ['cosmo city', 'cosmo'],                                     area: 'Cosmo City',                      price: 800  },
  { keywords: ['rustenburg', 'marikana', 'mogaswe', 'thabane'],           area: 'Rustenburg',                      price: 1650 },
  { keywords: ['bronkhorstspruit'],                                        area: 'Bronkhorstspruit',                price: 1000 },
  { keywords: ['moloto'],                                                  area: 'Moloto',                          price: 1000 },
  { keywords: ['mmakaunyane'],                                             area: 'Mmakaunyane',                     price: 700  },
  { keywords: ['krugersdorp'],                                             area: 'Krugersdorp',                     price: 1000 },
  { keywords: ['nkangala'],                                                area: 'Nkangala',                        price: 1100 },
  { keywords: ['kwa mhlanga', 'kwamhlanga'],                               area: 'Kwa Mhlanga',                     price: 1200 },
  { keywords: ['marble hall'],                                             area: 'Marble Hall',                     price: 1500 },
  { keywords: ['phake', 'pankop'],                                         area: 'Phake / Pankop',                  price: 1200 },
  { keywords: ['kwaggafontein'],                                           area: 'Kwaggafontein',                   price: 1500 },
  { keywords: ['johannesburg', 'joburg', 'jozi', 'sandton', 'randburg'],  area: 'Johannesburg',                    price: 1200 },
  { keywords: ['midrand'],                                                  area: 'Midrand',                         price: 600  },
  { keywords: ['benoni', 'boksburg'],                                      area: 'Benoni / Boksburg',               price: 1500 },
  { keywords: ['springs', 'brakpan', 'nigel'],                            area: 'Springs / Brakpan / Nigel',       price: 1500 },
  { keywords: ['honeydew'],                                                area: 'Honeydew',                        price: 850  },
  { keywords: ['bakgati'],                                                 area: 'Bakgati',                         price: 1200 },
  { keywords: ['sefriskal', 'bela-bela', 'bela bela', 'warmbaths'],       area: 'Bela-Bela',                       price: 1500 },
  { keywords: ['modimolle', 'nylstroom'],                                  area: 'Modimolle',                       price: 1900 },
  { keywords: ['polokwane', 'pietersburg'],                                area: 'Polokwane',                       price: 4000 },
  { keywords: ['naboom', 'naboomspruit', 'mookgophong'],                  area: 'Naboomspruit',                    price: 3000 },
  { keywords: ['maobane'],                                                  area: 'Maobane',                         price: 700  },
];

function detectAreaAndPrice(formattedAddress, components) {
  const search = [
    formattedAddress,
    ...(components || []).map(c => c.long_name)
  ].join(' ').toLowerCase();

  for (const entry of AREA_PRICES) {
    for (const kw of entry.keywords) {
      if (search.includes(kw)) return entry;
    }
  }
  return null;
}

/* ── Load size ── */
let selectedLoadSize = null;

function selectLoadSize(size) {
  selectedLoadSize = size;
  document.querySelectorAll('.load-option').forEach(b => b.classList.remove('selected'));
  document.querySelector(`.load-option[data-size="${size}"]`).classList.add('selected');
}

/* ── Google Places autocomplete ── */
let selectedLat = null;
let selectedLng = null;

// Pre-declare all DOM refs so the event handler closes over stable references
const hiddenAddress   = document.getElementById('address-input');
const hiddenArea      = document.getElementById('area-input');
const elPriceSuggest  = document.getElementById('price-suggestion');
const elSuggestAmt    = document.getElementById('suggestion-amount');
const elPriceInput    = document.getElementById('price-input');

async function initAutocomplete() {
  try {
    await google.maps.importLibrary('places');
    const { PlaceAutocompleteElement } = google.maps.places;

    const placeAC = new PlaceAutocompleteElement({
      componentRestrictions: { country: 'za' },
      types: ['address']
    });

    Object.assign(placeAC.style, {
      width: '100%', display: 'block',
      borderRadius: '16px', border: '2px solid #E8EDF2',
      fontSize: '17px', color: '#1A1A2E',
      backgroundColor: '#F7F9FC',
      fontFamily: 'system-ui, -apple-system, sans-serif'
    });

    document.getElementById('address-container').appendChild(placeAC);

    placeAC.addEventListener('gmp-placeselect', async (event) => {
      console.log('gmp-placeselect fired');
      const place = event.place;
      try {
        await place.fetchFields({ fields: ['formattedAddress', 'location', 'addressComponents'] });

        console.log('formattedAddress:', place.formattedAddress);
        hiddenAddress.value = place.formattedAddress || '';
        console.log('address-input after set:', hiddenAddress.value);

        if (place.location) {
          selectedLat = place.location.lat();
          selectedLng = place.location.lng();
          console.log('Coords:', selectedLat, selectedLng);
        }

        const match = detectAreaAndPrice(place.formattedAddress, place.addressComponents);
        console.log('Area match:', match);

        if (match) {
          hiddenArea.value           = match.area;
          elSuggestAmt.textContent   = `R${match.price.toLocaleString()}`;
          elPriceSuggest.style.display = '';
          elPriceInput.value         = match.price;
        } else {
          hiddenArea.value             = 'Other';
          elPriceSuggest.style.display = 'none';
          elPriceInput.value           = '';
          elPriceInput.placeholder     = 'Enter your price';
        }
      } catch (err) {
        console.error('fetchFields error:', err);
      }
    });

    console.log('Autocomplete ready');
  } catch (err) {
    console.warn('Places init failed — using fallback:', err);
    const fb = Object.assign(document.createElement('input'), {
      type: 'text', placeholder: 'e.g. 123 Main Street, Centurion'
    });
    Object.assign(fb.style, {
      width: '100%', background: '#F7F9FC', border: '2px solid #E8EDF2',
      borderRadius: '16px', padding: '18px 20px', fontSize: '17px',
      color: '#1A1A2E', outline: 'none', fontFamily: 'inherit'
    });
    fb.addEventListener('input', () => { hiddenAddress.value = fb.value; });
    document.getElementById('address-container').appendChild(fb);
  }
}

initAutocomplete().catch(console.error);

/* ── Post job ── */
async function postJob() {
  console.log('postJob — address-input:', hiddenAddress.value);
  console.log('postJob — area-input:', hiddenArea.value);
  console.log('postJob — price-input:', elPriceInput.value);
  console.log('postJob — loadSize:', selectedLoadSize);

  const address = hiddenAddress.value.trim();
  if (!address) {
    const c = document.getElementById('address-container');
    c.classList.add('error');
    setTimeout(() => c.classList.remove('error'), 1200);
    return;
  }

  if (!selectedLoadSize) {
    document.querySelector('.load-option').style.outline = '2px solid #FF6D00';
    setTimeout(() => document.querySelector('.load-option').style.outline = '', 1200);
    alert('Please select a load size.');
    return;
  }

  const val     = parseInt(document.getElementById('price-input').value, 10);
  const wrapper = document.getElementById('price-wrapper');
  if (!val || val < 50) {
    wrapper.classList.add('error');
    document.getElementById('price-input').focus();
    setTimeout(() => wrapper.classList.remove('error'), 1200);
    return;
  }

  const btn = document.getElementById('btn-post');
  btn.disabled = true; btn.textContent = 'Posting…';

  try {
    const user = JSON.parse(localStorage.getItem('user'));
    const area = hiddenArea.value || 'Other';

    const jobRow = {
      trader_id:   user.id,
      area,
      address,
      load_size:   selectedLoadSize,
      offer_price: val,
      status:      'posted',
      lat:         selectedLat,
      lng:         selectedLng
    };

    console.log('Posting job:', JSON.stringify(jobRow));
    const { data, error } = await supabase.from('jobs').insert(jobRow).select().single();

    if (error) {
      console.error('Post job error:', JSON.stringify(error));
      btn.disabled = false; btn.textContent = 'POST MY JOB';
      alert('Failed to post job: ' + error.message + (error.details ? ' | ' + error.details : ''));
      return;
    }

    console.log('Job posted:', data);
    window.location.href = 'trader-home.html';
  } catch (err) {
    console.error('Post job error:', err);
    btn.disabled = false; btn.textContent = 'POST MY JOB';
    alert('Failed to post job. Please try again.');
  }
}
</script>
</body>
</html>
